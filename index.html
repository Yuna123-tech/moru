<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모루 인형 포즈 도우미</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons (as SVG components) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback, Fragment } = React;

        // 아이콘 컴포넌트들 (JSX Fragment를 사용하여 인접 요소 오류 해결)
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                camera: (
                    <Fragment>
                        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                        <circle cx="12" cy="13" r="3"/>
                    </Fragment>
                ),
                rotate: (
                    <Fragment>
                        <path d="M1 4v6h6"/>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </Fragment>
                ),
                save: (
                    <Fragment>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </Fragment>
                ),
                trash: (
                    <Fragment>
                        <path d="M3 6h18"/>
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                        <line x1="10" y1="11" x2="10" y2="17"/>
                        <line x1="14" y1="11" x2="14" y2="17"/>
                    </Fragment>
                ),
                help: (
                    <Fragment>
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </Fragment>
                ),
                download: (
                    <Fragment>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </Fragment>
                ),
                refresh: (
                    <Fragment>
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                        <path d="M16 16h5v5"/>
                    </Fragment>
                ),
                move: (
                    <Fragment>
                        <polyline points="5 9 2 12 5 15"/>
                        <polyline points="9 5 12 2 15 5"/>
                        <polyline points="15 19 12 22 9 19"/>
                        <polyline points="19 9 22 12 19 15"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <line x1="12" y1="2" x2="12" y2="22"/>
                    </Fragment>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const canvasRef = useRef(null);
            const [rotation, setRotation] = useState(0);
            const [selectedNodeId, setSelectedNodeId] = useState(null);
            const [savedPoses, setSavedPoses] = useState([]);
            const [showHelp, setShowHelp] = useState(false);

            // 초기 노드 데이터
            const [nodes, setNodes] = useState([
                { id: 'pelvis', x: 225, y: 300, color: '#94a3b8' },
                { id: 'waist', x: 225, y: 240, color: '#94a3b8' },
                { id: 'chest', x: 225, y: 180, color: '#94a3b8' },
                { id: 'neck', x: 225, y: 135, color: '#94a3b8' },
                { id: 'head', x: 225, y: 85, color: '#ffe4e6' },
                { id: 'l_shoulder', x: 185, y: 150, color: '#94a3b8' },
                { id: 'l_elbow', x: 145, y: 150, color: '#ffffff' },
                { id: 'l_hand', x: 105, y: 150, color: '#ffffff' },
                { id: 'r_shoulder', x: 265, y: 150, color: '#94a3b8' },
                { id: 'r_elbow', x: 305, y: 150, color: '#ffffff' },
                { id: 'r_hand', x: 345, y: 150, color: '#ffffff' },
                { id: 'l_hip', x: 200, y: 300, color: '#94a3b8' },
                { id: 'l_knee', x: 200, y: 370, color: '#ffffff' },
                { id: 'l_foot', x: 200, y: 440, color: '#ffffff' },
                { id: 'r_hip', x: 250, y: 300, color: '#94a3b8' },
                { id: 'r_knee', x: 250, y: 370, color: '#ffffff' },
                { id: 'r_foot', x: 250, y: 440, color: '#ffffff' },
            ]);

            const links = [
                { s: 'pelvis', t: 'waist', len: 60 }, { s: 'waist', t: 'chest', len: 60 },
                { s: 'chest', t: 'neck', len: 45 }, { s: 'neck', t: 'head', len: 50 },
                { s: 'neck', t: 'l_shoulder', len: 40 }, { s: 'neck', t: 'r_shoulder', len: 40 },
                { s: 'l_shoulder', t: 'l_elbow', len: 50 }, { s: 'l_elbow', t: 'l_hand', len: 50 },
                { s: 'r_shoulder', t: 'r_elbow', len: 50 }, { s: 'r_elbow', t: 'r_hand', len: 50 },
                { s: 'pelvis', t: 'l_hip', len: 25 }, { s: 'pelvis', t: 'r_hip', len: 25 },
                { s: 'l_hip', t: 'l_knee', len: 70 }, { s: 'l_knee', t: 'l_foot', len: 70 },
                { s: 'r_hip', t: 'r_knee', len: 70 }, { s: 'r_knee', t: 'r_foot', len: 70 },
            ];

            const resolveConstraints = useCallback((currentNodes, draggedId) => {
                let newNodes = JSON.parse(JSON.stringify(currentNodes));
                for (let i = 0; i < 20; i++) {
                    links.forEach(link => {
                        const n1 = newNodes.find(n => n.id === link.s);
                        const n2 = newNodes.find(n => n.id === link.t);
                        if (!n1 || !n2) return;
                        const dx = n2.x - n1.x;
                        const dy = n2.y - n1.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const diff = (link.len - dist) / dist;
                        const offsetX = dx * diff * 0.5;
                        const offsetY = dy * diff * 0.5;
                        if (n1.id === draggedId) { n2.x += offsetX * 2; n2.y += offsetY * 2; }
                        else if (n2.id === draggedId) { n1.x -= offsetX * 2; n1.y -= offsetY * 2; }
                        else { n1.x -= offsetX; n1.y -= offsetY; n2.x += offsetX; n2.y += offsetY; }
                    });
                }
                return newNodes;
            }, []);

            const draw = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { width, height } = canvas;
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, width, height);
                ctx.strokeStyle = '#f3f4f6';
                ctx.lineWidth = 1;
                for (let i = 0; i <= width; i += 50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke(); }
                for (let i = 0; i <= height; i += 50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke(); }
                ctx.save();
                ctx.translate(width / 2, height / 2);
                ctx.rotate((rotation * Math.PI) / 180);
                ctx.translate(-width / 2, -height / 2);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 14;
                links.forEach(link => {
                    const s = nodes.find(n => n.id === link.s);
                    const t = nodes.find(n => n.id === link.t);
                    if (s && t) { ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y); ctx.stroke(); }
                });
                nodes.forEach(node => {
                    const isHead = node.id === 'head';
                    const isPelvis = node.id === 'pelvis';
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, isHead ? 32 : (isPelvis ? 14 : 10), 0, Math.PI * 2);
                    ctx.fillStyle = node.color;
                    ctx.fill();
                    ctx.strokeStyle = '#1e293b';
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                    if (isHead) {
                        ctx.fillStyle = '#1e293b';
                        ctx.beginPath(); ctx.arc(node.x - 12, node.y - 6, 4, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(node.x + 12, node.y - 6, 4, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = '#fda4af';
                        ctx.beginPath(); ctx.arc(node.x - 18, node.y + 6, 6, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(node.x + 18, node.y + 6, 6, 0, Math.PI * 2); ctx.fill();
                    }
                    if (isPelvis) {
                        ctx.fillStyle = '#1e293b';
                        ctx.beginPath(); ctx.arc(node.x, node.y, 4, 0, Math.PI * 2); ctx.fill();
                    }
                });
                ctx.restore();
            }, [nodes, rotation]);

            useEffect(() => { draw(); }, [draw]);

            const getMousePos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rawX = (clientX - rect.left) * (canvas.width / rect.width);
                const rawY = (clientY - rect.top) * (canvas.height / rect.height);
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const angleRad = (-rotation * Math.PI) / 180;
                const dx = rawX - cx;
                const dy = rawY - cy;
                return {
                    x: cx + (dx * Math.cos(angleRad) - dy * Math.sin(angleRad)),
                    y: cy + (dx * Math.sin(angleRad) + dy * Math.cos(angleRad))
                };
            };

            const handleStart = (e) => {
                const pos = getMousePos(e);
                const found = [...nodes].reverse().find(n => {
                    const d = Math.sqrt((n.x - pos.x) ** 2 + (n.y - pos.y) ** 2);
                    return d < (n.id === 'head' ? 40 : 25);
                });
                if (found) setSelectedNodeId(found.id);
            };

            const handleMove = (e) => {
                if (!selectedNodeId) return;
                if (e.cancelable) e.preventDefault();
                const pos = getMousePos(e);
                setNodes(prev => {
                    if (selectedNodeId === 'pelvis') {
                        const targetNode = prev.find(n => n.id === 'pelvis');
                        const dx = pos.x - targetNode.x;
                        const dy = pos.y - targetNode.y;
                        return prev.map(n => ({ ...n, x: n.x + dx, y: n.y + dy }));
                    }
                    const updated = prev.map(n => n.id === selectedNodeId ? { ...n, x: pos.x, y: pos.y } : n);
                    return resolveConstraints(updated, selectedNodeId);
                });
            };

            const savePose = () => {
                setSavedPoses([...savedPoses, { id: Date.now(), nodes: JSON.parse(JSON.stringify(nodes)), rotation }]);
            };

            return (
                <div className="flex flex-col items-center min-h-screen p-4">
                    <header className="mb-6 text-center">
                        <h1 className="text-3xl font-bold text-rose-500 mb-2">🧸 모루 인형 포즈 도우미</h1>
                        <p className="text-slate-500 text-sm font-medium">관절이 분리되지 않아요! 골반을 잡고 전체를 움직여보세요.</p>
                    </header>

                    <div className="flex flex-col lg:flex-row gap-6 w-full max-w-6xl justify-center items-start">
                        <div className="flex flex-col gap-4">
                            <div className="relative bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-8 border-white ring-4 ring-rose-100">
                                <canvas
                                    ref={canvasRef}
                                    width={450}
                                    height={550}
                                    className="touch-none cursor-grab active:cursor-grabbing"
                                    onMouseDown={handleStart}
                                    onMouseMove={handleMove}
                                    onMouseUp={() => setSelectedNodeId(null)}
                                    onMouseLeave={() => setSelectedNodeId(null)}
                                    onTouchStart={handleStart}
                                    onTouchMove={handleMove}
                                    onTouchEnd={() => setSelectedNodeId(null)}
                                />
                                <button onClick={() => setShowHelp(!showHelp)} className="absolute top-6 right-6 p-2.5 bg-white/90 rounded-full shadow-lg hover:bg-white transition-all text-rose-500">
                                    <Icon name="help" className="w-7 h-7" />
                                </button>

                                {showHelp && (
                                    <div className="absolute inset-0 bg-slate-900/80 flex items-center justify-center p-8 z-20 backdrop-blur-sm">
                                        <div className="bg-white p-8 rounded-[2rem] max-w-sm border-t-8 border-rose-500 shadow-2xl">
                                            <h3 className="font-bold text-2xl mb-4 text-slate-800">조작 꿀팁! 💡</h3>
                                            <ul className="text-slate-600 space-y-4 text-sm font-medium">
                                                <li className="flex gap-3">
                                                    <span className="bg-rose-100 text-rose-600 w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs font-bold">1</span>
                                                    <span><strong>손이나 발</strong>을 당기면 몸이 자연스럽게 따라와요.</span>
                                                </li>
                                                <li className="flex gap-3">
                                                    <span className="bg-rose-100 text-rose-600 w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs font-bold">2</span>
                                                    <span>가운데 <strong>골반(검은 점)</strong>을 잡으면 인형 전체를 옮길 수 있어요.</span>
                                                </li>
                                                <li className="flex gap-3">
                                                    <span className="bg-rose-100 text-rose-600 w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs font-bold">3</span>
                                                    <span>회전 슬라이더로 <strong>물구나무</strong>를 쉽게 서보세요.</span>
                                                </li>
                                            </ul>
                                            <button onClick={() => setShowHelp(false)} className="mt-8 w-full py-4 bg-rose-500 text-white rounded-2xl font-bold hover:bg-rose-600 shadow-lg">알겠어요!</button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="bg-white p-6 rounded-[1.5rem] shadow-xl border border-slate-100 space-y-4">
                                <div className="flex justify-between items-center">
                                    <label className="text-sm font-bold text-slate-700 flex items-center gap-2 italic">
                                        <Icon name="refresh" className="w-5 h-5 text-rose-500 animate-spin-slow" /> POSE ROTATION
                                    </label>
                                    <span className="text-xs font-black bg-slate-800 text-white px-3 py-1 rounded-md">{rotation}°</span>
                                </div>
                                <input type="range" min="0" max="360" value={rotation} onChange={(e) => setRotation(parseInt(e.target.value))} className="w-full h-4 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-rose-500" />
                            </div>
                        </div>

                        <div className="flex flex-col gap-4 w-full lg:w-80">
                            <div className="bg-white p-6 rounded-[1.5rem] shadow-xl border border-slate-100">
                                <h3 className="font-black text-slate-800 mb-5 flex items-center gap-2 uppercase tracking-tight">
                                    <Icon name="camera" className="w-6 h-6 text-rose-500" /> Controls
                                </h3>
                                <div className="space-y-3">
                                    <button onClick={() => { setNodes([ { id: 'pelvis', x: 225, y: 300, color: '#94a3b8' }, { id: 'waist', x: 225, y: 240, color: '#94a3b8' }, { id: 'chest', x: 225, y: 180, color: '#94a3b8' }, { id: 'neck', x: 225, y: 135, color: '#94a3b8' }, { id: 'head', x: 225, y: 85, color: '#ffe4e6' }, { id: 'l_shoulder', x: 185, y: 150, color: '#94a3b8' }, { id: 'l_elbow', x: 145, y: 150, color: '#ffffff' }, { id: 'l_hand', x: 105, y: 150, color: '#ffffff' }, { id: 'r_shoulder', x: 265, y: 150, color: '#94a3b8' }, { id: 'r_elbow', x: 305, y: 150, color: '#ffffff' }, { id: 'r_hand', x: 345, y: 150, color: '#ffffff' }, { id: 'l_hip', x: 200, y: 300, color: '#94a3b8' }, { id: 'l_knee', x: 200, y: 370, color: '#ffffff' }, { id: 'l_foot', x: 200, y: 440, color: '#ffffff' }, { id: 'r_hip', x: 250, y: 300, color: '#94a3b8' }, { id: 'r_knee', x: 250, y: 370, color: '#ffffff' }, { id: 'r_foot', x: 250, y: 440, color: '#ffffff' } ]); setRotation(0); }} className="w-full flex items-center justify-center gap-2 bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-bold text-slate-600 border border-slate-200 transition-all">
                                        <Icon name="rotate" className="w-5 h-5" /> 초기화
                                    </button>
                                    <button onClick={savePose} className="w-full flex items-center justify-center gap-2 bg-rose-500 hover:bg-rose-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-rose-100 transition-all">
                                        <Icon name="save" className="w-5 h-5" /> 포즈 보관함 저장
                                    </button>
                                    <button onClick={() => { const link = document.createElement('a'); link.download = 'moru.png'; link.href = canvasRef.current.toDataURL(); link.click(); }} className="w-full flex items-center justify-center gap-2 bg-sky-500 hover:bg-sky-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-sky-100 transition-all">
                                        <Icon name="download" className="w-5 h-5" /> 사진 찍기 (PNG)
                                    </button>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-[1.5rem] shadow-xl border border-slate-100 flex-grow min-h-[300px]">
                                <h3 className="font-black text-slate-800 mb-5 flex items-center gap-2 uppercase tracking-tight">
                                    <Icon name="move" className="w-6 h-6 text-rose-500" /> Saved Album ({savedPoses.length})
                                </h3>
                                <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {savedPoses.length === 0 ? (
                                        <div className="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-xs">Empty</div>
                                    ) : (
                                        savedPoses.map((p, i) => (
                                            <div key={p.id} className="group flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100 hover:border-rose-200 transition-all">
                                                <button onClick={() => { setNodes(p.nodes); setRotation(p.rotation); }} className="flex-grow text-left font-bold text-slate-600 text-sm">
                                                    POSE #{i+1} <span className="text-[10px] text-slate-400 font-normal">({p.rotation}°)</span>
                                                </button>
                                                <button onClick={() => setSavedPoses(savedPoses.filter(sp => sp.id !== p.id))} className="text-slate-300 hover:text-rose-500 transition-colors">
                                                    <Icon name="trash" className="w-4 h-4" />
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
